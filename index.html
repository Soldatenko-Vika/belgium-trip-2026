<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>🔒 Приватна сторінка</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🧇%3C/text%3E%3C/svg%3E">
<style>
  html,body{height:100%}
  body{margin:0;display:flex;align-items:center;justify-content:center;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:#faf5ea;color:#26211a}
  .box{width:min(92vw,360px);text-align:center;padding:40px 28px}
  .lock{font-size:48px}
  h1{font-size:20px;margin:16px 0 6px;font-weight:700}
  p{color:#5d5442;font-size:14px;line-height:1.5;margin:0 0 20px}
  form{display:flex;gap:8px}
  input{flex:1;padding:12px 14px;font-size:15px;border:1.5px solid #26211a;border-radius:10px;
    background:#fffdf7;color:#26211a;outline:none}
  input:focus{box-shadow:3px 3px 0 #d99a1f}
  button{padding:12px 18px;font-size:15px;font-weight:600;border:1.5px solid #26211a;border-radius:10px;
    background:#26211a;color:#faf5ea;cursor:pointer}
  button:active{transform:translate(1px,1px)}
  .err{color:#c04a2a;font-size:13px;margin-top:14px;min-height:18px;font-weight:600}
</style>
</head>
<body>
  <div class="box">
    <div class="lock">🔒</div>
    <h1>Ця сторінка приватна</h1>
    <p>Введіть пароль, щоб переглянути.</p>
    <form id="f">
      <input id="pw" type="password" autocomplete="current-password" placeholder="Пароль" autofocus>
      <button type="submit">Відкрити</button>
    </form>
    <div class="err" id="err"></div>
  </div>

const ITER = 250000;
function b64(s){const b=atob(s),u=new Uint8Array(b.length);for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;}
async function decrypt(pw){
  const raw=b64(PAYLOAD);
  const salt=raw.slice(0,16), iv=raw.slice(16,28), data=raw.slice(28);
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const buf=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,data);
  return new TextDecoder().decode(buf);
}
async function unlock(pw,fromStore){
  try{
    const html=await decrypt(pw);
    try{sessionStorage.setItem('trip_pw',pw);}catch(e){}
    document.open();document.write(html);document.close();
  }catch(e){
    if(fromStore){try{sessionStorage.removeItem('trip_pw');}catch(_){}return;}
    document.getElementById('err').textContent='Невірний пароль';
    const i=document.getElementById('pw');i.value='';i.focus();
  }
}
document.getElementById('f').addEventListener('submit',ev=>{
  ev.preventDefault();
  const pw=document.getElementById('pw').value;
  if(pw)unlock(pw,false);
});
(function(){try{const s=sessionStorage.getItem('trip_pw');if(s)unlock(s,true);}catch(e){}})();
